<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makima Music 🎵</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0B0C10;
    --bg-secondary: #1F2833;
    --accent: #66FCF1;
    --accent2: #45A29E;
    --text-primary: #C5C6C7;
    --text-bright: #ffffff;
    --glow: rgba(102,252,241,0.4);
    --glow-soft: rgba(102,252,241,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Exo 2', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(102,252,241,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(102,252,241,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  #loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; gap: 16px; }
  .spinner-ring { width: 48px; height: 48px; border: 2px solid var(--bg-secondary); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; box-shadow: 0 0 20px var(--glow); }
  .loading-text { font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 100; padding: 40px; }
  .splash-logo { position: relative; margin-bottom: 32px; }
  .logo-icon { width: 90px; height: 90px; background: var(--bg-secondary); border: 1px solid var(--accent2); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 42px; position: relative; z-index: 1; box-shadow: 0 0 30px var(--glow-soft); }
  .logo-ring { position: absolute; top: -8px; left: -8px; width: 106px; height: 106px; border: 1px solid rgba(102,252,241,0.2); border-radius: 26px; animation: rotate-ring 8s linear infinite; }
  @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .splash-title { font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700; color: var(--text-bright); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .splash-title span { color: var(--accent); text-shadow: 0 0 20px var(--glow); }
  .splash-sub { font-size: 13px; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 60px; text-align: center; opacity: 0.8; }
  #startBtn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 16px 56px; border-radius: 4px; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 20px var(--glow-soft); }
  #startBtn:active { transform: scale(0.97); }
  #nothing { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 40px; position: relative; z-index: 1; }
  .nothing-icon { font-size: 64px; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--glow)); }
  .nothing-title { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-bright); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .nothing-sub { font-size: 13px; color: var(--accent2); letter-spacing: 1px; line-height: 1.8; }
  #player { display: none; flex-direction: column; align-items: center; width: 100vw; min-height: 100vh; padding: 20px 20px 40px; position: relative; z-index: 1; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 380px; padding: 10px 0 24px; }
  .top-bar-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(102,252,241,0.15); border-radius: 8px; cursor: pointer; color: var(--accent2); font-size: 14px; }
  .now-playing-label { font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 10px var(--glow); }
  .thumb-wrap { width: 100%; max-width: 340px; position: relative; margin-bottom: 24px; }
  .thumb-border { position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 1px solid rgba(102,252,241,0.25); border-radius: 18px; pointer-events: none; }
  .thumb-corner { position: absolute; width: 16px; height: 16px; border-color: var(--accent); border-style: solid; opacity: 0.8; }
  .thumb-corner.tl { top: -4px; left: -4px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .thumb-corner.tr { top: -4px; right: -4px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .thumb-corner.bl { bottom: -4px; left: -4px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .thumb-corner.br { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
  #thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 14px; object-fit: cover; display: block; box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px var(--glow-soft); }
  .song-row { width: 100%; max-width: 340px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  #songTitle { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 270px; }
  #requestedBy { font-size: 12px; color: var(--accent2); letter-spacing: 1px; margin-top: 3px; text-transform: uppercase; }
  .heart-btn { font-size: 20px; cursor: pointer; transition: transform 0.2s; }
  .heart-btn:active { transform: scale(1.3); }
  .waveform { width: 100%; max-width: 340px; height: 48px; display: flex; align-items: center; gap: 2px; margin-bottom: 14px; }
  .wave-bar { flex: 1; background: var(--accent); border-radius: 2px; animation: wave 1s ease-in-out infinite; opacity: 0.6; box-shadow: 0 0 4px var(--glow); }
  .wave-bar:nth-child(2n) { animation-duration: 1.3s; opacity: 0.4; }
  .wave-bar:nth-child(3n) { animation-duration: 0.9s; opacity: 0.7; }
  .wave-bar:nth-child(4n) { animation-duration: 1.5s; opacity: 0.35; }
  .wave-bar:nth-child(5n) { animation-duration: 1.1s; opacity: 0.55; }
  @keyframes wave { 0%, 100% { height: 15%; } 50% { height: 85%; } }
  .wave-bar.paused { animation-play-state: paused; }
  .progress-wrap { width: 100%; max-width: 340px; margin-bottom: 8px; }
  #progressBar { width: 100%; height: 3px; background: var(--bg-secondary); border-radius: 3px; margin-bottom: 8px; overflow: visible; position: relative; }
  #progressFill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 1s linear; box-shadow: 0 0 8px var(--glow); position: relative; }
  #progressFill::after { content: ''; position: absolute; right: -4px; top: -4px; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--glow); }
  .time-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--accent2); letter-spacing: 1px; font-family: 'Rajdhani', sans-serif; }
  .controls { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 320px; margin: 20px 0 28px; }
  .ctrl-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; cursor: pointer; transition: all 0.2s; opacity: 0.75; }
  .ctrl-btn:active { opacity: 1; filter: drop-shadow(0 0 8px var(--accent)); transform: scale(0.9); }
  .ctrl-btn.active { opacity: 1; filter: drop-shadow(0 0 6px var(--accent)); }
  .ctrl-btn svg { width: 26px; height: 26px; fill: var(--accent); }
  .ctrl-btn.sm svg { width: 20px; height: 20px; }
  .play-btn { width: 64px; height: 64px; border-radius: 50%; border: none; background: var(--accent); box-shadow: 0 0 30px var(--glow); opacity: 1 !important; }
  .play-btn svg { fill: var(--bg-primary) !important; width: 24px; height: 24px; }
  .play-btn:active { transform: scale(0.92); }
  #vibingBadge { display: flex; align-items: center; gap: 10px; background: var(--bg-secondary); border: 1px solid rgba(102,252,241,0.15); border-radius: 50px; padding: 10px 22px; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 2px; color: var(--text-primary); text-transform: uppercase; cursor: pointer; }
  .vibe-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--glow); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #vibingModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 500; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
  #vibingModal.open { display: flex; }
  .modal-box { background: var(--bg-secondary); border: 1px solid rgba(102,252,241,0.2); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 24px; max-height: 70vh; overflow-y: auto; position: relative; }
  .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; text-align: center; }
  .modal-close { position: absolute; top: 16px; right: 20px; font-size: 20px; cursor: pointer; color: var(--accent2); }
  .user-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(102,252,241,0.06); }
  .user-item:last-child { border-bottom: none; }
  .user-pfp-placeholder { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--bg-primary)); display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-bright); flex-shrink: 0; border: 1px solid rgba(102,252,241,0.2); }
  .user-info { flex: 1; }
  .user-name { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--text-bright); }
  .user-id { font-size: 11px; color: var(--accent2); letter-spacing: 1px; margin-top: 2px; }
  .vibe-status { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 4px; }
  .vibe-status::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
</style>
</head>
<body>

<div id="loading"><div class="spinner-ring"></div><div class="loading-text">Connecting</div></div>

<div id="splash">
  <div class="splash-logo"><div class="logo-icon">🎵</div><div class="logo-ring"></div></div>
  <div class="splash-title">Makima <span>Music</span></div>
  <div class="splash-sub">Sync live · Listen together</div>
  <button id="startBtn" onclick="startListening()">▶ START LISTENING</button>
</div>

<div id="nothing">
  <div class="nothing-icon">📡</div>
  <div class="nothing-title">No Signal</div>
  <div class="nothing-sub">Use /play in the group<br>to start the music</div>
</div>

<div id="player">
  <div class="top-bar">
    <div class="top-bar-btn">⌄</div>
    <div class="now-playing-label">◆ Now Playing ◆</div>
    <div class="top-bar-btn">☰</div>
  </div>
  <div class="thumb-wrap">
    <img id="thumbnail" src="" alt=""/>
    <div class="thumb-border"></div>
    <div class="thumb-corner tl"></div><div class="thumb-corner tr"></div>
    <div class="thumb-corner bl"></div><div class="thumb-corner br"></div>
  </div>
  <div class="song-row">
    <div><div id="songTitle">Loading...</div><div id="requestedBy">Added by —</div></div>
    <div class="heart-btn" onclick="toggleHeart(this)">🤍</div>
  </div>
  <div class="waveform" id="waveform"></div>
  <div class="progress-wrap">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div class="time-row"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
  </div>
  <div class="controls">
    <div class="ctrl-btn sm" onclick="shuffleClick(this)"><svg viewBox="0 0 24 24"><path d="M16 3h5v5l-1.8-1.8-4.6 4.6-1.4-1.4 4.6-4.6L16 3zM4 5l6.1 6.1-1.4 1.4L3 6.8 4 5zm14.6 9.9l4.6 4.6L21 21h-5v-2h3.2l-4.6-4.6 1.4-1.4zM3.4 17.2l5.6-5.6 1.4 1.4-5.6 5.6L3.4 17.2z"/></svg></div>
    <div class="ctrl-btn" onclick="seekBack()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></div>
    <div class="ctrl-btn play-btn" onclick="togglePlay()">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
    <div class="ctrl-btn" onclick="seekForward()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg></div>
    <div class="ctrl-btn sm" id="repeatBtn" onclick="toggleRepeat(this)"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></div>
  </div>
  <div id="vibingBadge" onclick="openVibingModal()">
    <div class="vibe-dot"></div>
    <span id="vibingCount">0 Vibing</span>
  </div>
</div>

<div id="vibingModal">
  <div class="modal-box">
    <div class="modal-title">◆ Currently Vibing ◆</div>
    <div class="modal-close" onclick="closeVibingModal()">✕</div>
    <div id="vibingUserList"></div>
  </div>
</div>

<!-- KEY: Hidden audio element -->
<audio id="audioPlayer" preload="auto" playsinline></audio>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxo7vd1FbKX5QgXKwPA4Qy2KARGqo3tkc",
    authDomain: "music-bot-ed1df.firebaseapp.com",
    databaseURL: "https://music-bot-ed1df-default-rtdb.firebaseio.com",
    projectId: "music-bot-ed1df",
    storageBucket: "music-bot-ed1df.firebasestorage.app",
    messagingSenderId: "667661301124",
    appId: "1:667661301124:web:9f5e3aa5d2cd0c800859d1"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getDatabase(fbApp);
  const audioEl = document.getElementById('audioPlayer');

  let currentAudioUrl = null;
  let isPlaying = false;
  let progressInterval = null;
  let myVibingRef = null;
  let chatId = null;
  let vibingData = {};
  let audioCtx = null;
  let sourceNode = null;
  let wakeLock = null;

  let tgUser = null;
  try { tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || null; } catch(e) {}

  // ===== MINIMIZE FIX — MediaSession API =====
  function setupMediaSession(title, artist, image) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || 'Makima Music',
      artist: artist || 'Now Playing',
      artwork: image ? [{ src: image, sizes: '512x512', type: 'image/jpeg' }] : []
    });
    navigator.mediaSession.setActionHandler('play', () => { audioEl.play(); resumeWave(); isPlaying = true; updatePlayBtn(); });
    navigator.mediaSession.setActionHandler('pause', () => { audioEl.pause(); pauseWave(); isPlaying = false; updatePlayBtn(); });
    navigator.mediaSession.setActionHandler('seekbackward', () => { audioEl.currentTime = Math.max(0, audioEl.currentTime - 10); });
    navigator.mediaSession.setActionHandler('seekforward', () => { audioEl.currentTime = audioEl.currentTime + 10; });
  }

  // ===== WAKE LOCK — Screen On Rakhta Hai =====
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch(e) {}
  }

  // ===== AUDIO CONTEXT TRICK — Background Play =====
  function initAudioContext() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      sourceNode = audioCtx.createMediaElementSource(audioEl);
      sourceNode.connect(audioCtx.destination);
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) {}
  }

  // ===== VISIBILITY CHANGE — Resume After Minimize =====
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && isPlaying) {
      // Wapas aaya — resume karo
      setTimeout(() => {
        if (audioEl.paused && isPlaying) {
          audioEl.play().catch(() => {});
        }
        if (audioCtx?.state === 'suspended') audioCtx.resume();
      }, 300);
    }
  });

  // Audio suspend/pause ke baad auto-resume
  audioEl.addEventListener('pause', () => {
    if (isPlaying && document.hidden) {
      setTimeout(() => {
        if (audioEl.paused && isPlaying) audioEl.play().catch(() => {});
      }, 500);
    }
  });

  audioEl.addEventListener('suspend', () => {
    if (isPlaying) {
      setTimeout(() => {
        if (audioEl.paused && isPlaying) audioEl.play().catch(() => {});
      }, 500);
    }
  });

  function buildWaveform() {
    const wf = document.getElementById('waveform');
    wf.innerHTML = '';
    for (let i = 0; i < 45; i++) {
      const b = document.createElement('div');
      b.className = 'wave-bar';
      b.style.animationDelay = (Math.random() * 1.5) + 's';
      wf.appendChild(b);
    }
  }
  buildWaveform();

  function fmt(s) { s = Math.floor(s); return Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + (s%60); }

  function startProgress() {
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      const cur = audioEl.currentTime, dur = audioEl.duration || 1;
      if (!isNaN(dur) && dur > 0) {
        document.getElementById('progressFill').style.width = (cur/dur*100) + '%';
        document.getElementById('currentTime').textContent = fmt(cur);
        document.getElementById('totalTime').textContent = fmt(dur);
        if ('mediaSession' in navigator) {
          try { navigator.mediaSession.setPositionState({ duration: dur, position: cur, playbackRate: 1 }); } catch(e) {}
        }
      }
    }, 1000);
  }

  function updatePlayBtn() {
    document.getElementById('playIcon').style.display = isPlaying ? 'none' : 'block';
    document.getElementById('pauseIcon').style.display = isPlaying ? 'block' : 'none';
  }

  window.startListening = async function() {
    if (window.Telegram?.WebApp) Telegram.WebApp.expand();

    document.getElementById('splash').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';

    // AudioContext initialize — user gesture ke baad
    initAudioContext();
    await requestWakeLock();

    const params = new URLSearchParams(window.location.search);
    chatId = params.get('chat_id') || params.get('startapp') || params.get('tgWebAppStartParam') || 'default';

    const myId = tgUser ? String(tgUser.id) : 'guest_' + Date.now();

    onValue(ref(db, 'rooms/' + chatId + '/now_playing'), snap => {
      document.getElementById('loading').style.display = 'none';
      const data = snap.val();
      if (!data || data.status === 'stopped') { showNothing(); return; }
      showPlayer(data);
    });

    // Vibing register
    myVibingRef = ref(db, 'rooms/' + chatId + '/vibing/' + myId);
    set(myVibingRef, {
      user_id: myId,
      name: tgUser ? (tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '')) : 'Listener',
      t: Date.now()
    });
    window.addEventListener('beforeunload', () => remove(myVibingRef));
    window.addEventListener('pagehide', () => remove(myVibingRef));

    onValue(ref(db, 'rooms/' + chatId + '/vibing'), snap => {
      vibingData = snap.val() || {};
      updateVibingUI();
    });
  };

  function showNothing() {
    document.getElementById('player').style.display = 'none';
    document.getElementById('nothing').style.display = 'flex';
    audioEl.pause(); audioEl.src = '';
    if (progressInterval) clearInterval(progressInterval);
  }

  function showPlayer(data) {
    document.getElementById('nothing').style.display = 'none';
    document.getElementById('player').style.display = 'flex';

    const title = data.title || 'Unknown';
    document.getElementById('songTitle').textContent = title.length > 32 ? title.substring(0,32)+'...' : title;
    document.getElementById('requestedBy').textContent = 'Added by ' + (data.requested_by || 'Someone');

    const imgUrl = data.cover || data.image || (data.video_id ? `https://img.youtube.com/vi/${data.video_id}/hqdefault.jpg` : '');
    if (imgUrl) document.getElementById('thumbnail').src = imgUrl;

    const now = Math.floor(Date.now() / 1000);
    const elapsed = Math.max(0, now - (data.start_time || now));

    const audioUrl = data.audio_url || '';

    if (audioUrl && audioUrl !== currentAudioUrl) {
      currentAudioUrl = audioUrl;
      audioEl.src = audioUrl;
      audioEl.currentTime = elapsed;

      // MediaSession setup — MINIMIZE FIX KEY PART
      setupMediaSession(title, data.artist || '', imgUrl);

      audioEl.play().then(() => {
        isPlaying = true;
        updatePlayBtn();
        resumeWave();
        startProgress();
        if (audioCtx?.state === 'suspended') audioCtx.resume();
      }).catch(e => console.log('Play error:', e));
    }

    if (data.status === 'paused') {
      audioEl.pause(); pauseWave();
      isPlaying = false; updatePlayBtn();
    }
  }

  function updateVibingUI() {
    const users = Object.values(vibingData);
    document.getElementById('vibingCount').textContent = users.length + ' Vibing';
    if (document.getElementById('vibingModal').classList.contains('open')) renderVibingModal();
  }

  function renderVibingModal() {
    const list = document.getElementById('vibingUserList');
    const users = Object.values(vibingData);
    if (!users.length) { list.innerHTML = '<div style="text-align:center;color:var(--accent2);padding:20px;font-size:13px">No one vibing right now</div>'; return; }
    list.innerHTML = '';
    users.forEach(u => {
      const d = document.createElement('div');
      d.className = 'user-item';
      d.innerHTML = `<div class="user-pfp-placeholder">${(u.name||'?')[0].toUpperCase()}</div><div class="user-info"><div class="user-name">${u.name||'Unknown'}</div><div class="user-id">ID: ${u.user_id||'—'}</div></div><div class="vibe-status">Vibing</div>`;
      list.appendChild(d);
    });
  }

  window.openVibingModal = () => { renderVibingModal(); document.getElementById('vibingModal').classList.add('open'); };
  window.closeVibingModal = () => document.getElementById('vibingModal').classList.remove('open');
  document.getElementById('vibingModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeVibingModal(); });

  audioEl.addEventListener('ended', () => { isPlaying = false; updatePlayBtn(); pauseWave(); });

  window.togglePlay = () => {
    if (isPlaying) { audioEl.pause(); pauseWave(); isPlaying = false; }
    else { audioEl.play(); resumeWave(); isPlaying = true; if (audioCtx?.state === 'suspended') audioCtx.resume(); }
    updatePlayBtn();
  };
  window.seekBack = () => { audioEl.currentTime = Math.max(0, audioEl.currentTime - 10); };
  window.seekForward = () => { audioEl.currentTime = audioEl.currentTime + 10; };
  window.shuffleClick = el => el.classList.toggle('active');
  window.toggleRepeat = el => { audioEl.loop = !audioEl.loop; el.classList.toggle('active'); };
  window.toggleHeart = el => { el.textContent = el.textContent === '🤍' ? '🩵' : '🤍'; };
  function pauseWave() { document.querySelectorAll('.wave-bar').forEach(b => b.classList.add('paused')); }
  function resumeWave() { document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('paused')); }
  window.addEventListener('load', () => { setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 800); });

  // Telegram activated event
  if (window.Telegram?.WebApp) {
    Telegram.WebApp.onEvent('activated', () => {
      if (isPlaying && audioEl.paused) { audioEl.play().catch(() => {}); if (audioCtx?.state === 'suspended') audioCtx.resume(); }
    });
  }
</script>
</body>
</html>
